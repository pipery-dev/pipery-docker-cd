owner = "pipery-dev"
action_name = "pipery-docker-cd"
title = "Pipery Docker CD"
description = "CD pipeline for Docker: pull image, deploy (ArgoCD/Cloud Run/Helm/Ansible), check status"
marketplace_category = "continuous-integration"
author = "pipery-dev"
action_type = "composite"
default_branch = "main"
version = "1.0.0"
repository_visibility = "public"
icon = "assets/icon.png"
test_command = ""
test_project_path = "test-project"
test_project_input = "project_path"
test_log_path = "pipery.jsonl"
test_log_success_values = ["success", "succeeded", "passed", "ok"]
cleanup_paths = ["pipery.jsonl"]

[[inputs]]
name = "project_path"
description = "Path to the project source tree the action should operate on."
required = false
default = "."

[[inputs]]
name = "config_file"
description = "Path to the pipery config file."
required = false
default = ".pipery/config.yaml"

[[inputs]]
name = "deploy_target"
description = "Deployment target: argocd, cloud-run, helm, or ansible."
required = false
default = "argocd"

[[inputs]]
name = "deploy_strategy"
description = "Deployment strategy: rolling, blue-green, or canary."
required = false
default = "rolling"

[[inputs]]
name = "skip_pull"
description = "Skip the image pull step."
required = false
default = "false"

[[inputs]]
name = "skip_deploy"
description = "Skip the deploy step."
required = false
default = "false"

[[inputs]]
name = "skip_status_check"
description = "Skip the status check step."
required = false
default = "false"

[[inputs]]
name = "image_name"
description = "Container image name to pull (e.g. ghcr.io/org/app)."
required = false
default = ""

[[inputs]]
name = "image_tag"
description = "Container image tag to pull."
required = false
default = "latest"

[[inputs]]
name = "registry"
description = "Container registry hostname."
required = false
default = "ghcr.io"

[[inputs]]
name = "registry_username"
description = "Username for registry login."
required = false
default = ""

[[inputs]]
name = "registry_password"
description = "Password or token for registry login."
required = false
default = ""

[[inputs]]
name = "argocd_server"
description = "ArgoCD server URL."
required = false
default = ""

[[inputs]]
name = "argocd_app"
description = "ArgoCD application name."
required = false
default = ""

[[inputs]]
name = "argocd_token"
description = "ArgoCD authentication token."
required = false
default = ""

[[inputs]]
name = "cloud_run_service"
description = "Cloud Run service name."
required = false
default = ""

[[inputs]]
name = "cloud_run_region"
description = "Cloud Run region."
required = false
default = "us-central1"

[[inputs]]
name = "cloud_run_image"
description = "Container image to deploy to Cloud Run."
required = false
default = ""

[[inputs]]
name = "helm_release"
description = "Helm release name."
required = false
default = ""

[[inputs]]
name = "helm_chart"
description = "Helm chart path or reference."
required = false
default = ""

[[inputs]]
name = "helm_namespace"
description = "Kubernetes namespace for Helm deployment."
required = false
default = "default"

[[inputs]]
name = "ansible_playbook"
description = "Path to the Ansible playbook file."
required = false
default = ""

[[inputs]]
name = "ansible_inventory"
description = "Path to the Ansible inventory file."
required = false
default = ""

[[inputs]]
name = "log_file"
description = "Path to write the JSONL log file."
required = false
default = "pipery.jsonl"

[[test_log_required_fields]]
name = "event"
value = "build"
