# GitLab CI Pipeline for pipery-docker-cd
# Docker image deployment to multiple targets
variables:
  PROJECT_PATH: "."
  IMAGE_NAME: ""
  IMAGE_TAG: "latest"
  DEPLOY_TARGET: "kubernetes"
  DEPLOY_STRATEGY: "rolling"
  REGISTRY: "ghcr.io"
  SKIP_DEPLOY: "false"
  LOG_FILE: "pipery.jsonl"

stages:
  - checkout
  - setup
  - download
  - deploy
  - status_check
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-checkout.sh
  env:
    INPUT_LOG_FILE: $LOG_FILE

setup:
  stage: setup
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/setup-psh.sh
  env:
    INPUT_LOG_FILE: $LOG_FILE

download:
  stage: download
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-pull.sh
  env:
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_REGISTRY: $REGISTRY
    INPUT_LOG_FILE: $LOG_FILE

deploy:
  stage: deploy
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-deploy.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_DEPLOY_TARGET: $DEPLOY_TARGET
    INPUT_DEPLOY_STRATEGY: $DEPLOY_STRATEGY
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_REGISTRY: $REGISTRY
    INPUT_REGISTRY_USERNAME: $REGISTRY_USERNAME
    INPUT_REGISTRY_PASSWORD: $REGISTRY_PASSWORD
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_DEPLOY == "true"'
      when: manual

status_check:
  stage: status_check
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-status.sh
  env:
    INPUT_DEPLOY_TARGET: $DEPLOY_TARGET
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_LOG_FILE: $LOG_FILE
  allow_failure: true

logs:
  stage: logs
  image: alpine:latest
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/main.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_LOG_FILE: $LOG_FILE
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 90 days
  when: always
