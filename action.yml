name: 'Pipery Docker CD'
description: 'CD pipeline for Docker: pull image, deploy (ArgoCD/Cloud Run/Helm/Ansible), check status'
inputs:
  project_path:
    description: 'Path to the project source tree the action should operate on.'
    required: false
    default: '.'
  config_file:
    description: 'Path to the pipery config file.'
    required: false
    default: '.github/pipery/config.yaml'
  deploy_target:
    description: 'Deployment target: argocd, cloud-run, helm, or ansible.'
    required: false
    default: 'argocd'
  deploy_strategy:
    description: 'Deployment strategy: rolling, blue-green, or canary.'
    required: false
    default: 'rolling'
  skip_pull:
    description: 'Skip the image pull step.'
    required: false
    default: 'false'
  skip_deploy:
    description: 'Skip the deploy step.'
    required: false
    default: 'false'
  skip_status_check:
    description: 'Skip the status check step.'
    required: false
    default: 'false'
  image_name:
    description: 'Container image name to pull (e.g. ghcr.io/org/app).'
    required: false
    default: ''
  image_tag:
    description: 'Container image tag to pull.'
    required: false
    default: 'latest'
  registry:
    description: 'Container registry hostname.'
    required: false
    default: 'ghcr.io'
  registry_username:
    description: 'Username for registry login.'
    required: false
    default: ''
  registry_password:
    description: 'Password or token for registry login.'
    required: false
    default: ''
  argocd_server:
    description: 'ArgoCD server URL.'
    required: false
    default: ''
  argocd_app:
    description: 'ArgoCD application name.'
    required: false
    default: ''
  argocd_token:
    description: 'ArgoCD authentication token.'
    required: false
    default: ''
  cloud_run_service:
    description: 'Cloud Run service name.'
    required: false
    default: ''
  cloud_run_region:
    description: 'Cloud Run region.'
    required: false
    default: 'us-central1'
  cloud_run_image:
    description: 'Container image to deploy to Cloud Run.'
    required: false
    default: ''
  helm_release:
    description: 'Helm release name.'
    required: false
    default: ''
  helm_chart:
    description: 'Helm chart path or reference.'
    required: false
    default: ''
  helm_namespace:
    description: 'Kubernetes namespace for Helm deployment.'
    required: false
    default: 'default'
  ansible_playbook:
    description: 'Path to the Ansible playbook file.'
    required: false
    default: ''
  ansible_inventory:
    description: 'Path to the Ansible inventory file.'
    required: false
    default: ''
  log_file:
    description: 'Path to write the JSONL log file.'
    required: false
    default: 'pipery.jsonl'
runs:
  using: composite
  steps:
    - name: Setup psh
      shell: bash
      run: "${{ github.action_path }}/src/setup-psh.sh"
      env:
        INPUT_LOG_FILE: ${{ inputs.log_file }}

    - name: Install pipery-tooling
      shell: bash
      run: pip install --quiet pipery-tooling 2>/dev/null || true

    - name: Pull image
      if: ${{ inputs.skip_pull != 'true' }}
      shell: bash
      run: "${{ github.action_path }}/src/step-pull.sh"
      env:
        INPUT_IMAGE_NAME: ${{ inputs.image_name }}
        INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_REGISTRY_USERNAME: ${{ inputs.registry_username }}
        INPUT_REGISTRY_PASSWORD: ${{ inputs.registry_password }}
        INPUT_LOG_FILE: ${{ inputs.log_file }}

    - name: Deploy
      if: ${{ inputs.skip_deploy != 'true' }}
      shell: bash
      run: "${{ github.action_path }}/src/step-deploy.sh"
      env:
        INPUT_PROJECT_PATH: ${{ inputs.project_path }}
        INPUT_DEPLOY_TARGET: ${{ inputs.deploy_target }}
        INPUT_DEPLOY_STRATEGY: ${{ inputs.deploy_strategy }}
        INPUT_ARGOCD_SERVER: ${{ inputs.argocd_server }}
        INPUT_ARGOCD_APP: ${{ inputs.argocd_app }}
        INPUT_ARGOCD_TOKEN: ${{ inputs.argocd_token }}
        INPUT_CLOUD_RUN_SERVICE: ${{ inputs.cloud_run_service }}
        INPUT_CLOUD_RUN_REGION: ${{ inputs.cloud_run_region }}
        INPUT_CLOUD_RUN_IMAGE: ${{ inputs.cloud_run_image }}
        INPUT_HELM_RELEASE: ${{ inputs.helm_release }}
        INPUT_HELM_CHART: ${{ inputs.helm_chart }}
        INPUT_HELM_NAMESPACE: ${{ inputs.helm_namespace }}
        INPUT_ANSIBLE_PLAYBOOK: ${{ inputs.ansible_playbook }}
        INPUT_ANSIBLE_INVENTORY: ${{ inputs.ansible_inventory }}
        INPUT_LOG_FILE: ${{ inputs.log_file }}

    - name: Check deployment status
      if: ${{ inputs.skip_status_check != 'true' }}
      shell: bash
      run: "${{ github.action_path }}/src/step-status.sh"
      env:
        INPUT_DEPLOY_TARGET: ${{ inputs.deploy_target }}
        INPUT_ARGOCD_SERVER: ${{ inputs.argocd_server }}
        INPUT_ARGOCD_APP: ${{ inputs.argocd_app }}
        INPUT_ARGOCD_TOKEN: ${{ inputs.argocd_token }}
        INPUT_CLOUD_RUN_SERVICE: ${{ inputs.cloud_run_service }}
        INPUT_CLOUD_RUN_REGION: ${{ inputs.cloud_run_region }}
        INPUT_HELM_RELEASE: ${{ inputs.helm_release }}
        INPUT_HELM_NAMESPACE: ${{ inputs.helm_namespace }}
        INPUT_LOG_FILE: ${{ inputs.log_file }}

    - name: Upload logs
      if: always()
      shell: bash
      run: "${{ github.action_path }}/src/main.sh"
      env:
        INPUT_PROJECT_PATH: ${{ inputs.project_path }}
        INPUT_LOG_FILE: ${{ inputs.log_file }}

branding:
  icon: package
  color: blue
