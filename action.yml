name: 'Pipery Docker CD'
description: 'CD pipeline for Docker: pull image, deploy (ArgoCD/Cloud Run/Helm/Ansible), check status'
inputs:
  project_path:
    description: 'Path to the project source tree the action should operate on.'
    required: false
    default: '.'
  config_file:
    description: 'Path to the pipery config file.'
    required: false
    default: '.github/pipery/config.yaml'
  deploy_target:
    description: 'Deployment target: argocd, cloud-run, helm, or ansible.'
    required: false
    default: 'argocd'
  deploy_strategy:
    description: 'Deployment strategy: rolling, blue-green, or canary.'
    required: false
    default: 'rolling'
  skip_pull:
    description: 'Skip the image pull step.'
    required: false
    default: 'false'
  skip_deploy:
    description: 'Skip the deploy step.'
    required: false
    default: 'false'
  skip_status_check:
    description: 'Skip the status check step.'
    required: false
    default: 'false'
  image_name:
    description: 'Container image name to pull (e.g. ghcr.io/org/app).'
    required: false
    default: ''
  image_tag:
    description: 'Container image tag to pull.'
    required: false
    default: 'latest'
  registry:
    description: 'Container registry hostname.'
    required: false
    default: 'ghcr.io'
  registry_username:
    description: 'Username for registry login.'
    required: false
    default: ''
  registry_password:
    description: 'Password or token for registry login.'
    required: false
    default: ''
  argocd_server:
    description: 'ArgoCD server URL.'
    required: false
    default: ''
  argocd_app:
    description: 'ArgoCD application name.'
    required: false
    default: ''
  argocd_token:
    description: 'ArgoCD authentication token.'
    required: false
    default: ''
  cloud_run_service:
    description: 'Cloud Run service name.'
    required: false
    default: ''
  cloud_run_region:
    description: 'Cloud Run region.'
    required: false
    default: 'us-central1'
  cloud_run_image:
    description: 'Container image to deploy to Cloud Run.'
    required: false
    default: ''
  helm_release:
    description: 'Helm release name.'
    required: false
    default: ''
  helm_chart:
    description: 'Helm chart path or reference.'
    required: false
    default: ''
  helm_namespace:
    description: 'Kubernetes namespace for Helm deployment.'
    required: false
    default: 'default'
  ansible_playbook:
    description: 'Path to the Ansible playbook file.'
    required: false
    default: ''
  ansible_inventory:
    description: 'Path to the Ansible inventory file.'
    required: false
    default: ''
  log_file:
    description: 'Path to write the JSONL log file.'
    required: false
    default: 'pipery.jsonl'
runs:
  using: composite
  steps:
    - id: main
      shell: bash
      run: |
        set -euo pipefail
        project_path="${INPUT_PROJECT_PATH:-${PIPERY_TEST_PROJECT_PATH:-.}}"
        log_path="${PIPERY_LOG_PATH:-pipery.jsonl}"
        if [ ! -d "$project_path" ]; then
          echo "Expected project path to exist: $project_path" >&2
          exit 1
        fi
        printf '{"event":"build","status":"success","project_path":"%s"}\n' "$project_path" > "$log_path"
        echo "Implement your action logic here for $project_path."
branding:
  icon: package
  color: blue
