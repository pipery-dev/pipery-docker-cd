# ============================================================================
# Bitbucket Pipelines Configuration for pipery-docker-cd
# Production-Ready Docker Deployment Pipeline
# ============================================================================
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to pipery-docker-cd repository root as bitbucket-pipelines.yml
# 2. Configure Protected Variables in Bitbucket
# 3. Set SKIP_* variables to 'true' to disable specific stages
#
# PROTECTED VARIABLES TO CONFIGURE:
# - REGISTRY_PASSWORD: Docker registry authentication token (Mark as Secured)
# - ARGOCD_TOKEN: ArgoCD authentication token (Mark as Secured)

definitions:
  steps:
    - step: &checkout-step
        name: Checkout Repository
        image: alpine:latest
        script:
          - echo "Repository checked out by Bitbucket Pipelines"
          - ls -la

    - step: &setup-step
        name: Setup Docker Environment
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/setup-psh.sh
        env:
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &pull-step
        name: Pull Docker Image
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-pull.sh
        env:
          INPUT_IMAGE_NAME: ${IMAGE_NAME}
          INPUT_IMAGE_TAG: ${IMAGE_TAG:-latest}
          INPUT_REGISTRY: ${REGISTRY:-ghcr.io}
          INPUT_REGISTRY_USERNAME: ${REGISTRY_USERNAME}
          INPUT_REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &deploy-step
        name: Deploy Application
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-deploy.sh
        env:
          INPUT_PROJECT_PATH: ${PROJECT_PATH:-.}
          INPUT_DEPLOY_TARGET: ${DEPLOY_TARGET:-argocd}
          INPUT_DEPLOY_STRATEGY: ${DEPLOY_STRATEGY:-rolling}
          INPUT_ARGOCD_SERVER: ${ARGOCD_SERVER}
          INPUT_ARGOCD_APP: ${ARGOCD_APP}
          INPUT_ARGOCD_TOKEN: ${ARGOCD_TOKEN}
          INPUT_CLOUD_RUN_SERVICE: ${CLOUD_RUN_SERVICE}
          INPUT_CLOUD_RUN_REGION: ${CLOUD_RUN_REGION:-us-central1}
          INPUT_CLOUD_RUN_IMAGE: ${CLOUD_RUN_IMAGE}
          INPUT_HELM_RELEASE: ${HELM_RELEASE}
          INPUT_HELM_CHART: ${HELM_CHART}
          INPUT_HELM_NAMESPACE: ${HELM_NAMESPACE:-default}
          INPUT_ANSIBLE_PLAYBOOK: ${ANSIBLE_PLAYBOOK}
          INPUT_ANSIBLE_INVENTORY: ${ANSIBLE_INVENTORY}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &status-step
        name: Check Deployment Status
        image: docker:latest
        services:
          - docker
        script:
          # Refactored: Call shared script instead of inline logic
          - bash ./src/step-status.sh
        env:
          INPUT_DEPLOY_TARGET: ${DEPLOY_TARGET:-argocd}
          INPUT_ARGOCD_SERVER: ${ARGOCD_SERVER}
          INPUT_ARGOCD_APP: ${ARGOCD_APP}
          INPUT_ARGOCD_TOKEN: ${ARGOCD_TOKEN}
          INPUT_CLOUD_RUN_SERVICE: ${CLOUD_RUN_SERVICE}
          INPUT_CLOUD_RUN_REGION: ${CLOUD_RUN_REGION:-us-central1}
          INPUT_HELM_RELEASE: ${HELM_RELEASE}
          INPUT_HELM_NAMESPACE: ${HELM_NAMESPACE:-default}
          INPUT_LOG_FILE: ${LOG_FILE:-pipery.jsonl}

    - step: &logs-step
        name: Collect & Archive Logs
        image: alpine:latest
        script:
          - echo "Collecting logs and artifacts..."
          - |
            if [ -f "${LOG_FILE:-pipery.jsonl}" ]; then
              echo "Log file size: $(wc -c < ${LOG_FILE:-pipery.jsonl}) bytes"
            fi
        artifacts:
          - ${LOG_FILE:-pipery.jsonl}

    - step: &dashboard-link
        name: Pipery Dashboard Link
        image: alpine:latest
        optional: true
        max-time: 5
        script:
          - echo "=================================================="
          - echo "Pipery Dashboard Link Generator"
          - echo "=================================================="
          - echo ""
          - # Construct artifact URL using Bitbucket's build endpoint
          - ARTIFACT_URL="https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}"
          - ""
          - # URL encode using Python (if available) or fall back to direct URL
          - ENCODED_ARTIFACT=$(python3 -c "import sys, urllib.parse; print(urllib.parse.quote('${ARTIFACT_URL}'))" 2>/dev/null || echo "${ARTIFACT_URL}")
          - ""
          - # Create dashboard URL
          - DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_ARTIFACT}"
          - ""
          - echo "Build Information:"
          - echo "  Repository: $BITBUCKET_REPO_FULL_NAME"
          - echo "  Build: $BITBUCKET_BUILD_NUMBER"
          - echo "  Branch: $BITBUCKET_BRANCH"
          - echo "  Commit: $BITBUCKET_COMMIT"
          - echo ""
          - echo "Artifact URL:"
          - echo "  $ARTIFACT_URL"
          - echo ""
          - echo "Dashboard Link:"
          - echo "[View in Pipery Dashboard]($DASHBOARD_URL)"
          - echo ""
          - |
            cat > dashboard-link.txt << 'DASHBOARD_EOF'
            # Pipery Dashboard Link

            Repository: $BITBUCKET_REPO_FULL_NAME
            Build: $BITBUCKET_BUILD_NUMBER
            Branch: $BITBUCKET_BRANCH
            Commit: $BITBUCKET_COMMIT
            Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)

            ## Dashboard
            [View in Pipery Dashboard]($DASHBOARD_URL)

            ## Direct Links
            - Bitbucket Build: https://bitbucket.org/${BITBUCKET_REPO_FULL_NAME}/pipelines/${BITBUCKET_BUILD_NUMBER}
            DASHBOARD_EOF
          - echo "Dashboard link info saved to dashboard-link.txt"
          - echo "=================================================="
        artifacts:
          - dashboard-link.txt


variables:
  # Deployment Configuration
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  DEPLOY_TARGET: "argocd"
  DEPLOY_STRATEGY: "rolling"

  # Image Pull Configuration
  IMAGE_NAME: ""  # REQUIRED: e.g., ghcr.io/myorg/myapp
  IMAGE_TAG: "latest"
  REGISTRY: "ghcr.io"
  REGISTRY_USERNAME: ""

  # Feature Flags
  SKIP_PULL: "false"
  SKIP_DEPLOY: "false"
  SKIP_STATUS_CHECK: "false"

  # ArgoCD Configuration
  ARGOCD_SERVER: ""
  ARGOCD_APP: ""

  # Cloud Run Configuration
  CLOUD_RUN_SERVICE: ""
  CLOUD_RUN_REGION: "us-central1"
  CLOUD_RUN_IMAGE: ""

  # Helm Configuration
  HELM_RELEASE: ""
  HELM_CHART: ""
  HELM_NAMESPACE: "default"

  # Ansible Configuration
  ANSIBLE_PLAYBOOK: ""
  ANSIBLE_INVENTORY: ""

  # Logging & Tracking
  LOG_FILE: "pipery.jsonl"

pipelines:
  default:
    - step: *checkout-step
    - step: *setup-step
    - step:
        <<: *pull-step
        condition:
          variable:
            - SKIP_PULL = "false"
        optional: true
    - step:
        <<: *deploy-step
        condition:
          variable:
            - SKIP_DEPLOY = "false"
    - step:
        <<: *status-step
        condition:
          variable:
            - SKIP_STATUS_CHECK = "false"
        optional: true
    - step: *logs-step
    - step: *dashboard-link

  branches:
    main:
      - step: *checkout-step
      - step: *setup-step
      - step:
          <<: *pull-step
          condition:
            variable:
              - SKIP_PULL = "false"
          optional: true
      - step:
          <<: *deploy-step
          condition:
            variable:
              - SKIP_DEPLOY = "false"
      - step:
          <<: *status-step
          condition:
            variable:
              - SKIP_STATUS_CHECK = "false"
          optional: true
      - step: *logs-step
      - step: *dashboard-link

  pull-requests:
    "**":
      - step: *checkout-step
      - step: *setup-step
      - step: *logs-step
      - step: *dashboard-link

  custom:
    deploy:
      - step: *checkout-step
      - step: *setup-step
      - step:
          <<: *pull-step
          condition:
            variable:
              - SKIP_PULL = "false"
          optional: true
      - step:
          <<: *deploy-step
          condition:
            variable:
              - SKIP_DEPLOY = "false"
      - step:
          <<: *status-step
          condition:
            variable:
              - SKIP_STATUS_CHECK = "false"
          optional: true
      - step: *logs-step
      - step: *dashboard-link
