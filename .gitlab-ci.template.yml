# GitLab CI Pipeline for pipery-docker-cd
# This is the GitLab CI equivalent of the GitHub Actions Docker CD workflow
# For Docker image deployment to various targets (ArgoCD, Cloud Run, Helm, Ansible)

variables:
  PROJECT_PATH: "."
  CONFIG_FILE: ".pipery/config.yaml"
  DEPLOY_TARGET: "argocd"
  DEPLOY_STRATEGY: "rolling"
  SKIP_PULL: "false"
  SKIP_DEPLOY: "false"
  SKIP_STATUS_CHECK: "false"
  IMAGE_NAME: ""
  IMAGE_TAG: "latest"
  REGISTRY: "ghcr.io"
  REGISTRY_USERNAME: ""
  REGISTRY_PASSWORD: ""
  ARGOCD_SERVER: ""
  ARGOCD_APP: ""
  ARGOCD_TOKEN: ""
  CLOUD_RUN_SERVICE: ""
  CLOUD_RUN_REGION: "us-central1"
  CLOUD_RUN_IMAGE: ""
  HELM_RELEASE: ""
  HELM_CHART: ""
  HELM_NAMESPACE: "default"
  ANSIBLE_PLAYBOOK: ""
  ANSIBLE_INVENTORY: ""
  LOG_FILE: "pipery.jsonl"

stages:
  - checkout
  - setup
  - pull
  - deploy
  - status
  - logs

checkout:
  stage: checkout
  image: alpine:latest
  script:
    - echo "Repository already checked out by GitLab CI"
    - ls -la

setup:
  stage: setup
  image: docker:latest
  services:
    - docker:dind
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/setup-psh.sh
  env:
    INPUT_LOG_FILE: $LOG_FILE

pull:
  stage: pull
  image: docker:latest
  services:
    - docker:dind
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-pull.sh
  env:
    INPUT_IMAGE_NAME: $IMAGE_NAME
    INPUT_IMAGE_TAG: $IMAGE_TAG
    INPUT_REGISTRY: $REGISTRY
    INPUT_REGISTRY_USERNAME: $REGISTRY_USERNAME
    INPUT_REGISTRY_PASSWORD: $REGISTRY_PASSWORD
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_PULL == "true"'
      when: never
    - when: on_success
  allow_failure: true

deploy:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - pull
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-deploy.sh
  env:
    INPUT_PROJECT_PATH: $PROJECT_PATH
    INPUT_DEPLOY_TARGET: $DEPLOY_TARGET
    INPUT_DEPLOY_STRATEGY: $DEPLOY_STRATEGY
    INPUT_ARGOCD_SERVER: $ARGOCD_SERVER
    INPUT_ARGOCD_APP: $ARGOCD_APP
    INPUT_ARGOCD_TOKEN: $ARGOCD_TOKEN
    INPUT_CLOUD_RUN_SERVICE: $CLOUD_RUN_SERVICE
    INPUT_CLOUD_RUN_REGION: $CLOUD_RUN_REGION
    INPUT_CLOUD_RUN_IMAGE: $CLOUD_RUN_IMAGE
    INPUT_HELM_RELEASE: $HELM_RELEASE
    INPUT_HELM_CHART: $HELM_CHART
    INPUT_HELM_NAMESPACE: $HELM_NAMESPACE
    INPUT_ANSIBLE_PLAYBOOK: $ANSIBLE_PLAYBOOK
    INPUT_ANSIBLE_INVENTORY: $ANSIBLE_INVENTORY
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_DEPLOY == "true"'
      when: never
    - when: on_success
  allow_failure: true

status:
  stage: status
  image: docker:latest
  services:
    - docker:dind
  dependencies:
    - deploy
  script:
    # Refactored: Call shared script instead of inline logic
    - bash ./src/step-status.sh
  env:
    INPUT_DEPLOY_TARGET: $DEPLOY_TARGET
    INPUT_ARGOCD_SERVER: $ARGOCD_SERVER
    INPUT_ARGOCD_APP: $ARGOCD_APP
    INPUT_ARGOCD_TOKEN: $ARGOCD_TOKEN
    INPUT_CLOUD_RUN_SERVICE: $CLOUD_RUN_SERVICE
    INPUT_CLOUD_RUN_REGION: $CLOUD_RUN_REGION
    INPUT_HELM_RELEASE: $HELM_RELEASE
    INPUT_HELM_NAMESPACE: $HELM_NAMESPACE
    INPUT_LOG_FILE: $LOG_FILE
  rules:
    - if: '$SKIP_STATUS_CHECK == "true"'
      when: never
    - when: on_success
  allow_failure: true

publish_logs:
  stage: logs
  image: alpine:latest
  script:
    - echo "Collecting logs and artifacts..."
    - |
      if [ -f "$LOG_FILE" ]; then
        echo "Log file size: $(wc -c < $LOG_FILE) bytes"
      fi
  artifacts:
    paths:
      - $LOG_FILE
    expire_in: 90 days
  when: always

# ============================================================================
# DASHBOARD LINK GENERATION
# ============================================================================

dashboard_link:
  stage: logs
  image: alpine:latest
  needs:
    - publish_logs
  script:
    - echo "Generating Pipery Dashboard link..."
    - |
      # Get the artifact URL from GitLab API
      ARTIFACT_URL="${CI_SERVER_URL}/api/v4/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts"
      echo "Artifact URL: $ARTIFACT_URL"

      # URL encode the artifact path
      ENCODED_URL=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1],safe=''))" "$ARTIFACT_URL")

      # Create dashboard link
      DASHBOARD_URL="https://dash.pipery.dev/?artifact=${ENCODED_URL}"

      # Output the link in markdown format
      echo ""
      echo "=========================================="
      echo "Pipery Dashboard Link"
      echo "=========================================="
      echo "[$DASHBOARD_URL]($DASHBOARD_URL)"
      echo ""
      echo "Direct URL:"
      echo "$DASHBOARD_URL"
      echo "=========================================="
      echo ""

      # Save to artifact file for persistence
      mkdir -p artifacts
      echo "DASHBOARD_URL=$DASHBOARD_URL" > artifacts/dashboard_link.env
  artifacts:
    paths:
      - artifacts/
    reports:
      dotenv: artifacts/dashboard_link.env
    expire_in: 90 days
  allow_failure: true
  when: always
